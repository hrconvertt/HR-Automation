<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Convertt — Org Hierarchy Editor</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  /* ─── Base Reset & Vars ─── */
  :root {
    --ink: #111613;
    --ink-2: #2A3330;
    --line: #DDE3E0;
    --bg: #f0f4f8;
    --warn: #C24F2D;
    --warn-soft: #FBEDE6;
    --muted: #6B7773;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(135deg, #667eea11 0%, #764ba211 25%, #f093fb11 50%, #4facfe11 75%, #00f2fe11 100%),
                linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.45;
    min-height: 100vh;
  }

  /* ─── Topbar ─── */
  header.topbar {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
    color: #fff;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 4px solid;
    border-image: linear-gradient(90deg, #F59E0B, #EF4444, #EC4899, #8B5CF6, #06B6D4, #10B981) 1;
    box-shadow: 0 4px 20px rgba(15, 52, 96, 0.3);
  }
  header .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  header .logo .dot {
    width: 24px; height: 24px;
    background: linear-gradient(135deg, #F59E0B, #EC4899);
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 13px;
    font-weight: 800;
    box-shadow: 0 2px 8px rgba(236, 72, 153, 0.4);
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header .right { margin-left: auto; display: flex; gap: 8px; }

  /* ─── Buttons ─── */
  button {
    appearance: none;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 150ms ease;
    background: transparent;
    color: inherit;
    line-height: 1;
  }
  button.primary {
    background: linear-gradient(135deg, #06B6D4, #3B82F6);
    color: #fff;
    box-shadow: 0 2px 8px rgba(6, 182, 212, 0.3);
  }
  button.primary:hover {
    background: linear-gradient(135deg, #0891B2, #2563EB);
    box-shadow: 0 4px 12px rgba(6, 182, 212, 0.4);
    transform: translateY(-1px);
  }
  button.ghost {
    background: transparent;
    color: #fff;
    border-color: rgba(255,255,255,0.25);
  }
  button.ghost:hover { background: rgba(255,255,255,0.08); }
  button.small {
    background: rgba(255,255,255,0.12);
    color: #fff;
    padding: 5px 9px;
    font-size: 11.5px;
    border: 1px solid rgba(255,255,255,0.2);
  }
  button.small:hover { background: rgba(255,255,255,0.2); }
  button.danger {
    background: var(--warn-soft);
    color: var(--warn);
  }
  button.danger:hover { background: var(--warn); color: #fff; }
  button.icon {
    width: 26px; height: 26px;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 6px;
  }
  button.icon:hover { color: var(--ink); border-color: var(--ink-2); }

  /* ─── Toolbar ─── */
  .toolbar {
    background: #fff;
    border-bottom: 1px solid var(--line);
    padding: 12px 24px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .toolbar .group {
    display: flex; gap: 6px;
    padding-right: 12px;
    border-right: 1px solid var(--line);
  }
  .toolbar .group:last-child { border-right: none; }
  .toolbar input[type=file] { display: none; }
  .toolbar .stat {
    margin-left: auto;
    display: flex;
    gap: 16px;
    color: var(--muted);
    font-size: 12px;
    align-items: center;
  }
  .toolbar .stat .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #f0f0f0;
    padding: 4px 10px;
    border-radius: 999px;
    font-weight: 600;
    color: var(--ink-2);
  }
  .toolbar .stat .pill.warn { background: var(--warn-soft); color: var(--warn); }
  .toolbar .stat .pill.green { background: #ecfdf5; color: #059669; }

  /* ─── Tree ─── */
  .tree-container {
    padding: 32px 24px 120px;
  }
  .tree, .tree ul {
    list-style: none;
    padding-left: 0;
    margin: 0;
  }
  .tree ul {
    margin-left: 32px;
    border-left: 2px solid #e2e8f0;
    padding-left: 20px;
    margin-top: 8px;
  }
  .tree li {
    position: relative;
    margin: 10px 0;
  }

  /* ─── Node Card (the star of the show) ─── */
  .node {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-left: 5px solid #94a3b8;
    border-radius: 12px;
    padding: 12px 16px;
    min-width: 300px;
    max-width: 400px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transition: all 200ms ease;
    cursor: grab;
    position: relative;
    overflow: hidden;
  }
  .node::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 5px; height: 100%;
    border-radius: 12px 0 0 12px;
    /* This is overridden by JS with department color */
  }
  .node:hover {
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    transform: translateY(-2px);
  }
  .node.dragging { opacity: 0.45; cursor: grabbing; transform: scale(0.98); }
  .node.drop-target {
    border-color: #06B6D4;
    background: #ecfeff;
    box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.2);
  }

  /* Placeholder / Vacant */
  .node.placeholder, .node.vacant {
    border-style: dashed;
    border-color: #94a3b8 !important;
    background: #f8fafc;
    opacity: 0.85;
  }
  .node.placeholder .nm, .node.vacant .nm {
    color: var(--muted);
    font-style: italic;
  }

  /* Conflict — pulsing red */
  .node.conflict {
    border-color: #EF4444 !important;
    border-left-color: #EF4444 !important;
    background: linear-gradient(135deg, #fef2f2, #fee2e2);
    animation: conflictPulse 2s ease-in-out infinite;
  }
  .node.conflict::after {
    content: '⚠ DUPLICATE';
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: #EF4444;
    background: #fff;
    border: 1px solid #FCA5A5;
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: 6px;
    box-shadow: 0 1px 3px rgba(239,68,68,0.15);
  }
  @keyframes conflictPulse {
    0%, 100% { box-shadow: 0 2px 8px rgba(239, 68, 68, 0.1); }
    50% { box-shadow: 0 2px 16px rgba(239, 68, 68, 0.3); }
  }

  /* ─── Avatar ─── */
  .node .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: #94a3b8;
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    letter-spacing: 0.5px;
    transition: transform 200ms ease;
  }
  .node:hover .avatar {
    transform: scale(1.08);
  }
  .node.placeholder .avatar, .node.vacant .avatar {
    background: #cbd5e1;
    color: #fff;
  }
  .node.conflict .avatar {
    background: linear-gradient(135deg, #EF4444, #DC2626) !important;
  }

  /* ─── Node Body ─── */
  .node .body {
    flex: 1;
    min-width: 0;
  }
  .node .nm {
    font-weight: 700;
    color: var(--ink);
    font-size: 13.5px;
    line-height: 1.15;
    margin-bottom: 2px;
  }
  .node .ttl {
    color: var(--ink-2);
    font-size: 12px;
    line-height: 1.2;
    margin-bottom: 3px;
  }
  .node .dept {
    display: inline-block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    background: #f1f5f9;
    color: #64748b;
  }
  .node .actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 150ms ease;
  }
  .node:hover .actions { opacity: 1; }

  /* ─── Toggle ─── */
  .toggle {
    position: relative;
    background: #fff;
    border: 2px solid var(--line);
    color: var(--muted);
    border-radius: 50%;
    width: 20px; height: 20px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    margin-right: 6px;
    cursor: pointer;
    user-select: none;
    transition: all 150ms ease;
  }
  .toggle:hover { border-color: #06B6D4; color: #06B6D4; }
  .toggle.collapsed { background: linear-gradient(135deg, #6366F1, #8B5CF6); color: #fff; border-color: transparent; }
  .toggle.leaf { visibility: hidden; }

  li.collapsed > ul { display: none; }

  /* ─── Note chip ─── */
  .note {
    margin-left: 8px;
    font-size: 10px;
    background: #FEF3C7;
    color: #92400E;
    border: 1px solid #FDE68A;
    border-radius: 4px;
    padding: 2px 6px;
    cursor: help;
    font-weight: 500;
  }

  /* ─── Department Legend ─── */
  .dept-legend {
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 14px 18px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    z-index: 999;
    max-height: 340px;
    overflow-y: auto;
    font-size: 12px;
    min-width: 220px;
  }
  .dept-legend h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #64748b;
    margin-bottom: 10px;
    font-weight: 700;
  }
  .dept-legend .dept-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
  }
  .dept-legend .dept-dot {
    width: 14px; height: 14px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .dept-legend .dept-name {
    color: #334155;
    font-weight: 500;
  }
  .dept-legend .dept-toggle {
    font-size: 10px;
    color: #94a3b8;
    cursor: pointer;
    margin-bottom: 8px;
    border: none;
    background: none;
    padding: 2px 0;
  }
  .dept-legend .dept-toggle:hover { color: #64748b; }
  .dept-legend.collapsed .dept-rows { display: none; }

  /* ─── Modal ─── */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(17, 22, 19, 0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 14px;
    padding: 0;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    overflow: hidden;
  }
  .modal .modal-header {
    background: linear-gradient(90deg, #F59E0B, #EC4899, #8B5CF6, #06B6D4);
    padding: 16px 24px;
    color: #fff;
  }
  .modal .modal-header h2 {
    margin: 0;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
  }
  .modal .modal-body {
    padding: 24px;
  }
  .modal .modal-body label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    margin-top: 12px;
  }
  .modal .modal-body label:first-child { margin-top: 0; }
  .modal .modal-body input, .modal .modal-body select, .modal .modal-body textarea {
    width: 100%;
    padding: 8px 10px;
    border-radius: 7px;
    border: 1px solid var(--line);
    font-size: 13px;
    font-family: inherit;
    color: var(--ink);
    background: #fff;
  }
  .modal .modal-body textarea { min-height: 60px; resize: vertical; font-family: inherit; }
  .modal .modal-body input:focus, .modal .modal-body select:focus, .modal .modal-body textarea:focus {
    outline: none;
    border-color: #8B5CF6;
    box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
  }
  .modal .modal-body .row { display: flex; gap: 10px; }
  .modal .modal-body .row > div { flex: 1; }
  .modal .modal-footer {
    display: flex; gap: 8px; justify-content: flex-end; padding: 16px 24px; border-top: 1px solid #f1f5f9; }
  .modal .modal-footer button { padding: 9px 16px; font-size: 13px; }
  .modal .modal-footer .secondary {
    background: transparent;
    color: var(--ink-2);
    border: 1px solid var(--line);
  }

  /* ─── JSON Panel ─── */
  .json-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #0f172a;
    color: #e2e8f0;
    font-family: 'SF Mono', Menlo, Consolas, monospace;
    font-size: 11.5px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 300ms ease;
    border-top: 4px solid;
    border-image: linear-gradient(90deg, #F59E0B, #EC4899, #8B5CF6, #06B6D4, #10B981) 1;
  }
  .json-panel.open { max-height: 50vh; }
  .json-panel header {
    background: #1e293b;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border: none;
  }
  .json-panel header span {
    font-weight: 700;
    background: linear-gradient(90deg, #06B6D4, #8B5CF6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    font-size: 11px;
  }
  .json-panel header .close {
    margin-left: auto;
    background: transparent;
    color: #e2e8f0;
    border: none;
    cursor: pointer;
    font-size: 16px;
  }
  .json-panel pre {
    padding: 14px;
    margin: 0;
    overflow: auto;
    max-height: calc(50vh - 40px);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ─── Toast ─── */
  .toast {
    position: fixed;
    top: 84px;
    right: 24px;
    background: #0f172a;
    color: #fff;
    padding: 11px 16px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 13px;
    opacity: 0;
    transform: translateX(20px);
    transition: opacity 180ms ease, transform 180ms ease;
    z-index: 2000;
    border-left: 4px solid #10B981;
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }
  .toast.show { opacity: 1; transform: translateX(0); }
  .toast.warn { border-left-color: #EF4444; }

  /* ─── Responsive ─── */
  @media (max-width: 768px) {
    .dept-legend { display: none; }
    .node { min-width: 260px; max-width: 340px; padding: 10px 12px; }
    .tree ul { margin-left: 20px; padding-left: 14px; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="logo">
    <span class="dot">C</span>
    <span>Convertt</span>
  </div>
  <h1>Org Hierarchy Editor</h1>
  <div class="right">
    <button class="ghost" id="btnViewJson">View JSON</button>
  </div>
</header>

<div class="toolbar">
  <div class="group">
    <button class="primary" id="btnAddRoot">+ Add Person</button>
    <button class="small" id="btnAddPlaceholder">+ Placeholder</button>
  </div>
  <div class="group">
    <button class="small" id="btnImport">Import JSON</button>
    <input type="file" id="fileImport" accept="application/json,.json" />
    <button class="small" id="btnExport">Download JSON</button>
    <button class="small" id="btnCopy">Copy JSON</button>
  </div>
  <div class="group">
    <button class="small" id="btnExpandAll">Expand all</button>
    <button class="small" id="btnCollapseAll">Collapse all</button>
  </div>
  <div class="group">
    <button class="small" id="btnPushSocket" title="Calls pushToSocket() — wire your endpoint">↪ Push to Websocket</button>
  </div>
  <div class="stat">
    <span class="pill green"><b id="statTotal">0</b> total</span>
    <span class="pill"><b id="statPlaceholder">0</b> placeholders</span>
    <span class="pill warn"><b id="statConflict">0</b> conflicts</span>
  </div>
</div>

<div class="tree-container">
  <ul class="tree" id="tree"></ul>
</div>

<!-- ─── Department Legend ─── -->
<div class="dept-legend" id="deptLegend">
  <h3>🎨 Departments</h3>
  <button class="dept-toggle" id="legendToggle">Hide</button>
  <div class="dept-rows" id="legendRows"></div>
</div>

<!-- ─── Modal ─── -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Edit person</h2>
    </div>
    <div class="modal-body">
      <input type="hidden" id="m_id" />
      <div class="row">
        <div>
          <label>Name</label>
          <input id="m_name" placeholder="Full name (or VACANT)" />
        </div>
        <div>
          <label>Status</label>
          <select id="m_status">
            <option value="active">Active</option>
            <option value="placeholder">Placeholder</option>
            <option value="vacant">Vacant</option>
          </select>
        </div>
      </div>
      <label>Title</label>
      <input id="m_title" placeholder="e.g. Head of Engineering" />
      <label>Department</label>
      <input id="m_department" placeholder="e.g. Engineering" />
      <label>Note (optional)</label>
      <textarea id="m_note" placeholder="Reason for placeholder, conflict notes, etc."></textarea>
      <div style="margin-top:12px;">
        <label style="display:inline-flex;align-items:center;gap:6px;text-transform:none;letter-spacing:0;font-weight:500;color:var(--ink-2);font-size:13px;">
          <input type="checkbox" id="m_conflict" style="width:auto;" /> Flag as conflict (duplicate/ambiguous role)
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="danger" id="m_delete" style="margin-right:auto;">Delete</button>
      <button class="secondary" id="m_cancel">Cancel</button>
      <button class="primary" id="m_save">Save</button>
    </div>
  </div>
</div>

<!-- ─── JSON peek panel ─── -->
<div class="json-panel" id="jsonPanel">
  <header>
    <span>org-data.json</span>
    <button class="close" id="jsonClose">×</button>
  </header>
  <pre id="jsonText"></pre>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   Convertt Org Editor — Colorful Edition
   ============================================================ */

// ─── Department Colors ───
const DEPT_COLORS = {
  'Executive': {
    primary: '#F59E0B', bg: '#FFFBEB', border: '#FDE68A',
    text: '#92400E', avatar: '#D97706', light: '#FEF3C7'
  },
  'Admin & Support': {
    primary: '#64748B', bg: '#F8FAFC', border: '#CBD5E1',
    text: '#334155', avatar: '#475569', light: '#F1F5F9'
  },
  'Finance': {
    primary: '#3B82F6', bg: '#EFF6FF', border: '#BFDBFE',
    text: '#1E40AF', avatar: '#2563EB', light: '#DBEAFE'
  },
  'Human Resource': {
    primary: '#8B5CF6', bg: '#F5F3FF', border: '#DDD6FE',
    text: '#5B21B6', avatar: '#7C3AED', light: '#EDE9FE'
  },
  'Business Development & Marketing': {
    primary: '#14B8A6', bg: '#F0FDFA', border: '#99F6E4',
    text: '#0F766E', avatar: '#0D9488', light: '#CCFBF1'
  },
  'Marketing & Media Team': {
    primary: '#EC4899', bg: '#FDF2F8', border: '#FBCFE8',
    text: '#9D174D', avatar: '#DB2777', light: '#FCE7F3'
  },
  'UI/UX': {
    primary: '#F97316', bg: '#FFF7ED', border: '#FED7AA',
    text: '#9A3412', avatar: '#EA580C', light: '#FFEDD5'
  },
  'Web - Shopify Development': {
    primary: '#06B6D4', bg: '#ECFEFF', border: '#A5F3FC',
    text: '#155E75', avatar: '#0891B2', light: '#CFFAFE'
  },
  'Web - WordPress': {
    primary: '#6366F1', bg: '#EEF2FF', border: '#C7D2FE',
    text: '#3730A3', avatar: '#4F46E5', light: '#E0E7FF'
  },
  'Operations / Client Servicing': {
    primary: '#EF4444', bg: '#FEF2F2', border: '#FECACA',
    text: '#991B1B', avatar: '#DC2626', light: '#FEE2E2'
  },
  'Engineering': {
    primary: '#10B981', bg: '#ECFDF5', border: '#A7F3D0',
    text: '#065F46', avatar: '#059669', light: '#D1FAE5'
  }
};
const DEFAULT_DEPT_COLOR = {
  primary: '#6B7280', bg: '#F9FAFB', border: '#E5E7EB',

// ─── State ───
let TREE = JSON.parse(JSON.stringify(INITIAL_DATA))
const collapsed = new Set()
let editingId = null

// ─── Utilities ───
function genId(name) {
  const base = (name || 'node').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '')
  let id = base || 'node'
  let n = 1
  while (findNode(id)) id = (base || 'node') + '-' + (++n)
  return id
}
function findNode(id, node = TREE) {
  if (!node || !node.id) return null
  if (node.id === id) return node
  for (const c of (node.children || [])) {
    const f = findNode(id, c); if (f) return f
  }
  return null
}
function findParent(id, node = TREE, parent = null) {
  if (!node || !node.id) return null
  if (node.id === id) return parent
  for (const c of (node.children || [])) {
    const f = findParent(id, c, node); if (f) return f
  }
  return null
}
function removeNode(id) {
  const p = findParent(id)
  if (!p) return null
  const idx = p.children.findIndex(c => c.id === id)
  if (idx === -1) return null
  return p.children.splice(idx, 1)[0]
}
function isDescendant(maybeAncestorId, childId) {
  const ancestor = findNode(maybeAncestorId)
  if (!ancestor) return false
  return !!findNode(childId, ancestor)
}
function initials(name) {
  return name.split(/\s+/).filter(Boolean).slice(0,2).map(w => w[0]).join('').toUpperCase()
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]))
}

// ─── Stats ───
function countAll() {
  let total = 0, ph = 0, conflict = 0
  function walk(n) {
    if (!n || !n.id) return
    total++
    if (n.status === 'placeholder' || n.status === 'vacant') ph++
    if (n.conflict) conflict++
    ;(n.children || []).forEach(walk)
  }
  walk(TREE)
  return { total, ph, conflict }
}

// ─── Render ───
function render() {
  const root = document.getElementById('tree')
  root.innerHTML = ''
  root.appendChild(renderNode(TREE))
  const s = countAll()
  document.getElementById('statTotal').textContent = s.total
  document.getElementById('statPlaceholder').textContent = s.ph
  document.getElementById('statConflict').textContent = s.conflict
  refreshJsonPanel()
}
function renderNode(node) {
  const li = document.createElement('li')
  if (collapsed.has(node.id)) li.classList.add('collapsed')

  const hasKids = (node.children && node.children.length > 0)
  const toggle = document.createElement('span')
  toggle.className = 'toggle' + (hasKids ? '' : ' leaf') + (collapsed.has(node.id) ? ' collapsed' : '')
  toggle.textContent = collapsed.has(node.id) ? '+' : '−'
  toggle.title = collapsed.has(node.id) ? 'Expand' : 'Collapse'
  toggle.addEventListener('click', (e) => {
    e.stopPropagation()
    if (!hasKids) return
    if (collapsed.has(node.id)) collapsed.delete(node.id)
    else collapsed.add(node.id)
    render()
  })

  const card = document.createElement('div')
  card.className = 'node'
  if (node.status === 'placeholder' || node.status === 'vacant') card.classList.add('placeholder')
  if (node.conflict) card.classList.add('conflict')
  card.draggable = true
  card.dataset.id = node.id

  // Get department colors
  const dc = getDeptColor(node.department)
  const isRoot = (node.id === TREE.id)

  // Build inner HTML with dept-colored department badge
  card.innerHTML = `
    <div class="avatar">${escapeHtml(initials(node.name || '?'))}</div>
    <div class="body">
      <div class="nm">${escapeHtml(node.name || 'Unnamed')}</div>
      <div class="ttl">${escapeHtml(node.title || '—')}</div>
      <div class="dept">${escapeHtml(node.department || 'Unassigned')}</div>
    </div>
    <div class="actions">
      <button class="icon" data-act="add" title="Add report">＋</button>
      <button class="icon" data-act="edit" title="Edit">✎</button>
      ${isRoot ? '' : '<button class="icon" data-act="del" title="Delete">✕</button>'}
    </div>
  `

  // ─── Apply department colors ───
  if (!node.conflict) {
    // Card background
    card.style.background = dc.bg
    // Thick left border in department color
    card.style.borderLeftColor = dc.primary
    card.style.borderLeftWidth = '5px'
    // Subtle top-right border accent
    card.style.borderTopColor = dc.border
    card.style.borderRightColor = dc.border
    card.style.borderBottomColor = dc.border
  }

  // Avatar
  const avatarEl = card.querySelector('.avatar')
  if (avatarEl) {
    if (isRoot) {
      avatarEl.style.background = 'linear-gradient(135deg, #F59E0B, #EAB308)'
      avatarEl.style.boxShadow = '0 2px 8px rgba(245, 158, 11, 0.4)'
      avatarEl.style.width = '46px'
      avatarEl.style.height = '46px'
      avatarEl.style.fontSize = '16px'
    } else if (!node.conflict) {
      avatarEl.style.background = `linear-gradient(135deg, ${dc.primary}, ${dc.avatar})`
      avatarEl.style.boxShadow = `0 2px 8px ${dc.primary}33`
    }
  }

  // Department badge pill
  const deptEl = card.querySelector('.dept')
  if (deptEl && !node.conflict) {
    deptEl.style.background = dc.light
    deptEl.style.color = dc.text
    deptEl.style.border = `1px solid ${dc.border}`
  }

  // Note
  if (node.note) {
    const nt = document.createElement('span')
    nt.className = 'note'
    nt.textContent = node.note.length > 80 ? node.note.slice(0,77) + '…' : node.note
    nt.title = node.note
    card.appendChild(nt)
  }

  // Action buttons
  card.querySelectorAll('button.icon').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation()
      const act = btn.dataset.act
      if (act === 'add') openModalAdd(node.id)
      else if (act === 'edit') openModalEdit(node.id)
      else if (act === 'del') deleteNode(node.id)
    })
  })

  // Drag
  card.addEventListener('dragstart', (e) => {
    e.dataTransfer.effectAllowed = 'move'
    e.dataTransfer.setData('text/plain', node.id)
    card.classList.add('dragging')
  })
  card.addEventListener('dragend', () => card.classList.remove('dragging'))
  card.addEventListener('dragover', (e) => {
    e.preventDefault()
    e.dataTransfer.dropEffect = 'move'
    card.classList.add('drop-target')
  })
  card.addEventListener('dragleave', () => card.classList.remove('drop-target'))
  card.addEventListener('drop', (e) => {
    e.preventDefault()
    card.classList.remove('drop-target')
    const draggedId = e.dataTransfer.getData('text/plain')
    if (!draggedId || draggedId === node.id) return
    reparent(draggedId, node.id)
  })

  card.addEventListener('dblclick', () => openModalEdit(node.id))

  li.appendChild(toggle)
  li.appendChild(card)

  if (hasKids) {
    const ul = document.createElement('ul')
    node.children.forEach(c => ul.appendChild(renderNode(c)))
    li.appendChild(ul)
  }
  return li
}

// ─── Mutations ───
function reparent(childId, newParentId) {
  if (childId === TREE.id) { toast('Cannot move the root', true); return }
  if (isDescendant(childId, newParentId)) { toast('Cannot move a node into its own descendant', true); return }
  const child = findNode(childId)
  if (!child) return
  const oldP = findParent(childId)
  oldP.children = oldP.children.filter(c => c.id !== childId)
  const newP = findNode(newParentId)
  newP.children = newP.children || []
  child.parentId = newParentId
  newP.children.push(child)
  toast(`Reparented "${child.name}" → "${newP.name}"`)
  render()
}
function deleteNode(id) {
  if (id === TREE.id) { toast('Cannot delete the root', true); return }
  const node = findNode(id)
  if (!node) return
  const kids = (node.children || []).length
  const ask = kids > 0
    ? `Delete "${node.name}" and reattach ${kids} report${kids===1?'':'s'} to its parent?`
    : `Delete "${node.name}"?`
  if (!confirm(ask)) return
  const parent = findParent(id)
  if (kids > 0) {
    node.children.forEach(c => { c.parentId = parent.id; parent.children.push(c) })
  }
  parent.children = parent.children.filter(c => c.id !== id)
  toast(`Deleted "${node.name}"`)
  render()
}
function addChild(parentId, data) {
  const parent = findNode(parentId)
  if (!parent) return
  const id = genId(data.name)
  const node = {
    id, parentId,
    name: data.name || 'Unnamed',
    title: data.title || '',
    department: data.department || (parent.department || ''),
    status: data.status || 'active',
    conflict: !!data.conflict,
    note: data.note || '',
    children: []
  }
  parent.children = parent.children || []
  parent.children.push(node)
  toast(`Added "${node.name}"`)
  render()
}

function flattenForSocket(node, acc = []) {
  if (!node || !node.id) return acc

  const url = ''
  if (!url) {
    toast('No websocket URL configured. Edit pushToSocket() in the file.', true)
    return
  }
  pushToSocket(stripUiState(TREE), url)
  toast('Pushed to ' + url)
})

// ─── Toast ───
let toastTimer
function toast(msg, isWarn = false) {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.classList.toggle('warn', !!isWarn)
  el.classList.add('show')
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400)
}

// Initial render
render()
</script>
